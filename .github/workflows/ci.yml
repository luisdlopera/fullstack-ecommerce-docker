name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint monorepo
        run: npm run lint

      - name: Build monorepo
        run: npm run build

      - name: Test backend
        run: npm run test -w back -- --runInBand

      - name: Test frontend
        run: npm run test -w front
