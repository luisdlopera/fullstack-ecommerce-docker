name: Security Audit

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "30 7 * * 1"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies (block critical only)
        run: |
          npm audit --omit=dev --audit-level=critical
          npm audit --omit=dev --audit-level=critical -w back
          npm audit --omit=dev --audit-level=critical -w front

      - name: Generate full audit reports
        run: |
          npm audit --json > audit-root.json || true
          npm audit --json -w back > audit-back.json || true
          npm audit --json -w front > audit-front.json || true

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-reports
          path: |
            audit-root.json
            audit-back.json
            audit-front.json
