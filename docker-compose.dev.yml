services:
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
      target: builder
    command: sh -c "npx prisma db push --skip-generate && npm run start:dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      TAX_RATE: ${TAX_RATE:-0.15}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-replace-with-mercadopago-access-token}
    healthcheck:
      disable: true
    volumes:
      - ./back:/app
      - back_node_modules:/app/node_modules

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      target: deps
    command: sh -c "npm install && npm run dev -- --webpack --hostname 0.0.0.0 --port 3000"
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - back
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules
      - front_next_cache:/app/.next

volumes:
  back_node_modules:
  front_node_modules:
  front_next_cache:
