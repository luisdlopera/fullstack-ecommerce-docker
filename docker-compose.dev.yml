services:
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
      target: builder
    command: sh -c "npx prisma migrate deploy && npm run start:dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    healthcheck:
      disable: true
    volumes:
      - ./back:/app
      - back_node_modules:/app/node_modules

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      target: deps
    command: npm run dev -- --webpack --hostname 0.0.0.0 --port 3000
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - back
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules
      - front_next_cache:/app/.next

volumes:
  back_node_modules:
  front_node_modules:
  front_next_cache:
