services:
  postgres:
    image: postgres:16
    container_name: nexstore_db
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexstore}
      POSTGRES_DB: ${POSTGRES_DB:-nexstore}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nexstore} -d ${POSTGRES_DB:-nexstore}']
      interval: 10s
      timeout: 5s
      retries: 5

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: nexstore_back
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexstore}:${POSTGRES_PASSWORD:-nexstore}@postgres:5432/${POSTGRES_DB:-nexstore}?schema=public
      CORS_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:4000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: nexstore_front
    restart: unless-stopped
    depends_on:
      back:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      INTERNAL_API_URL: http://back:4000/api
    ports:
      - '3000:3000'

volumes:
  pg_data:
